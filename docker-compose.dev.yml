# Local development dependencies only. Run the API and web with `npm run dev`
# on the host for hot reload; this just provides Postgres and Redis.
#
#   docker compose -f docker-compose.dev.yml up -d
#   npm run db:migrate && npm run db:seed
#   npm run dev:api   # terminal 1
#   npm run dev:web   # terminal 2

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-workshopos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-prod}
      POSTGRES_DB: ${POSTGRES_DB:-workshopos}
    ports:
      - '5432:5432'
    volumes:
      - pgdata_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata_dev:
