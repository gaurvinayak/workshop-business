server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Send API calls to the api container so the browser stays same-origin
  # (no CORS, cookies just work). The api mounts everything under /api/v1.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA fallback: every unknown path serves index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed static assets aggressively.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
